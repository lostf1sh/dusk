name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build Linux x86_64
        run: |
          rustup target add x86_64-unknown-linux-musl
          cargo build --release --target x86_64-unknown-linux-musl
          cd target/x86_64-unknown-linux-musl/release
          tar czf dusk-x86_64-unknown-linux-musl.tar.gz dusk

      - name: Build macOS x86_64
        run: |
          rustup target add x86_64-apple-darwin
          cargo build --release --target x86_64-apple-darwin
          cd target/x86_64-apple-darwin/release
          tar czf dusk-x86_64-apple-darwin.tar.gz dusk
        env:
          MACOSX_DEPLOYMENT_TARGET: "10.13"

      - name: Build macOS arm64
        run: |
          rustup target add aarch64-apple-darwin
          cargo build --release --target aarch64-apple-darwin
          cd target/aarch64-apple-darwin/release
          tar czf dusk-aarch64-apple-darwin.tar.gz dusk
        env:
          MACOSX_DEPLOYMENT_TARGET: "11.0"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            target/x86_64-unknown-linux-musl/release/dusk-x86_64-unknown-linux-musl.tar.gz
            target/x86_64-apple-darwin/release/dusk-x86_64-apple-darwin.tar.gz
            target/aarch64-apple-darwin/release/dusk-aarch64-apple-darwin.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
